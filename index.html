<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Glitchy maghale</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #0b0b0b;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      position: relative;
    }

    .container {
      max-width: 1000px;
      width: 100%;
      background: #141414;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid #2a2a2a;
      min-height: 500px;
      position: relative;
      z-index: 10;
    }

    h2, h3, h4 {
      color: #f5f5f5;
      font-weight: 500;
    }

    .glitchy-title {
      font-size: 2rem;
      color: #ff8c00;
      text-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
      border-bottom: 2px solid #2a2a2a;
      padding-bottom: 15px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .glitchy-title span {
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #ccc;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.2s;
      display: block;
      position: relative;
      z-index: 5;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #ff8c00;
      box-shadow: 0 0 8px rgba(255, 140, 0, 0.2);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    /* استایل دکمه‌ها با تضمین ۱۰۰٪ قابلیت لمس روی موبایل */
    .btn {
      background: #2a2a2a;
      border: none;
      padding: 15px 28px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1.05rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #eee;
      display: block;
      width: 100%;
      text-align: center;
      user-select: none;
      position: relative !important;
      z-index: 99999 !important;
      pointer-events: auto !important;
    }

    .btn-primary {
      background: #ff8c00 !important;
      color: #0b0b0b !important;
    }

    .btn-link {
      background: none !important;
      border: none !important;
      color: #ff8c00 !important;
      text-decoration: underline;
      display: inline-block !important;
      width: auto !important;
      padding: 10px 15px !important;
      font-size: 1.05rem !important;
      cursor: pointer !important;
      position: relative !important;
      z-index: 99999 !important;
      pointer-events: auto !important;
    }

    .btn-danger {
      background: #c0392b !important;
      color: white !important;
      padding: 6px 14px;
      font-size: 0.85rem;
      border-radius: 8px;
      width: auto;
      display: inline-block;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .cat-card {
      background: #1c1c1c;
      border-radius: 20px;
      padding: 35px 15px;
      text-align: center;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
      font-size: 1.2rem;
      color: #ddd;
    }

    .cat-card:hover {
      background: #282828;
      border-color: #ff8c00;
    }

    .hidden {
      display: none !important;
    }

    .auth-box {
      max-width: 450px;
      margin: 30px auto;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
      position: relative;
      z-index: 20;
    }

    .auth-box h2 {
      margin-bottom: 20px;
      text-align: center;
      color: #ff8c00;
    }

    .auth-box .btn {
      margin-top: 20px;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 25px;
      color: #888;
      position: relative;
      z-index: 30;
    }

    .admin-dots {
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
      padding: 0 15px;
      user-select: none;
      position: relative;
    }

    .dropdown-menu {
      position: absolute;
      top: 45px;
      left: 0;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 10px 0;
      min-width: 200px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      z-index: 100000;
    }

    .dropdown-menu div {
      padding: 12px 22px;
      cursor: pointer;
      color: #ddd;
    }
    .dropdown-menu div:hover {
      background: #2a2a2a;
      color: #ff8c00;
    }

    .relative {
      position: relative;
    }

    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      padding: 12px 18px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #2a2a2a;
    }

    .article-card {
      background: #181818;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid #2a2a2a;
      cursor: pointer;
    }
    .article-card img {
      max-width: 100%;
      border-radius: 12px;
      margin: 12px 0;
    }

    .article-meta-box {
      display: flex;
      gap: 15px;
      color: #888;
      font-size: 0.85rem;
      margin-top: 10px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .single-article {
      background: #161616;
      border-radius: 20px;
      padding: 30px;
      border: 1px solid #2a2a2a;
    }
    .main-text {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #ccc;
      margin: 25px 0;
      white-space: pre-wrap;
    }
    .image-gallery {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .gallery-img {
      max-height: 200px;
      max-width: 31%;
      border-radius: 10px;
      object-fit: cover;
    }

    .comments-section {
      margin-top: 40px;
      border-top: 1px solid #2a2a2a;
      padding-top: 20px;
    }
    .comment-item {
      background: #202020;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      border-right: 4px solid #ff8c00;
    }
    .comment-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #ff8c00;
    }

    .file-input-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-input-group label {
      background: #252525;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      border: 1px solid #3a3a3a;
    }
    .file-input-group input[type="file"] {
      display: none;
    }

    .checkbox-group, .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 10px 0;
    }
    .checkbox-group label, .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .back-btn {
      background: none;
      border: none;
      color: #ff8c00;
      cursor: pointer;
      font-size: 1.1rem;
      margin-bottom: 20px;
      width: auto;
      display: inline-block;
    }

    .section-title {
      font-size: 1.5rem;
      border-right: 4px solid #ff8c00;
      padding-right: 15px;
      margin: 25px 0 15px;
    }
  </style>
</head>

      <div class="dropdown-menu hidden" id="dropdownMenu">

        <div onclick="openUsersSection()">👥 Users</div>
        <div onclick="openCreateArticleSection()">✏️ Create Article</div>
        <div onclick="handleLogout()">🚪 Logout</div>

    </div>
  </div>

          <label><input type="checkbox" id="regNews" value="news"> News</label>
        </div>
