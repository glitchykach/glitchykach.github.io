<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitchy maghale</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0b0b0b;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      width: 100%;
      background: #141414;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid #2a2a2a;
      min-height: 500px;
    }

    h1, h2, h3 {
      color: #f5f5f5;
      font-weight: 500;
    }

    .glitchy-title {
      font-size: 2rem;
      color: #ff8c00;
      text-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
      letter-spacing: 1px;
      border-bottom: 2px solid #2a2a2a;
      padding-bottom: 15px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .glitchy-title span {
      font-size: 0.9rem;
      color: #888;
      font-weight: normal;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #ccc;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      padding: 12px 16px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: border 0.2s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #ff8c00;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btn {
      background: #2a2a2a;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #eee;
    }

    .btn-primary {
      background: #ff8c00;
      color: #0b0b0b;
    }
    .btn-primary:hover {
      background: #e67e00;
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
    }

    .btn-danger {
      background: #c0392b;
      color: white;
    }
    .btn-danger:hover {
      background: #e74c3c;
    }

    .btn-secondary {
      background: #2c2c2c;
      color: #ccc;
    }
    .btn-secondary:hover {
      background: #3a3a3a;
    }

    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }

    .flex-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .cat-card {
      background: #1c1c1c;
      border-radius: 20px;
      padding: 30px 15px;
      text-align: center;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
      font-size: 1.2rem;
      color: #ddd;
    }

    .cat-card:hover {
      background: #282828;
      border-color: #ff8c00;
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .hidden {
      display: none !important;
    }

    .auth-box {
      max-width: 450px;
      margin: 30px auto;
    }

    .auth-box .btn {
      width: 100%;
      margin-top: 10px;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 15px;
      color: #888;
    }
    .auth-toggle a {
      color: #ff8c00;
      cursor: pointer;
      text-decoration: underline;
    }

    .admin-dots {
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
      padding: 0 10px;
      user-select: none;
      position: relative;
    }

    .admin-dots:hover {
      color: #ff8c00;
    }

    .dropdown-menu {
      position: absolute;
      top: 50px;
      left: 0;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 10px 0;
      min-width: 200px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      z-index: 100;
    }

    .dropdown-menu div {
      padding: 12px 22px;
      cursor: pointer;
      color: #ddd;
      transition: 0.1s;
    }
    .dropdown-menu div:hover {
      background: #2a2a2a;
      color: #ff8c00;
    }

    .relative {
      position: relative;
    }

    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      padding: 10px 18px;
      border-radius: 12px;
      margin-bottom: 8px;
      border: 1px solid #2a2a2a;
    }

    .article-preview {
      background: #181818;
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid #2a2a2a;
    }

    .article-preview img {
      max-width: 100%;
      border-radius: 12px;
      margin: 10px 0;
    }

    .article-meta {
      color: #ff8c00;
      font-size: 0.8rem;
    }

    .file-input-group {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-input-group label {
      background: #252525;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      border: 1px solid #3a3a3a;
    }
    .file-input-group input[type="file"] {
      display: none;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 10px 0;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #ccc;
    }
    .checkbox-group input[type="checkbox"],
    .checkbox-group input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #ff8c00;
      cursor: pointer;
    }

    .radio-group {
      display: flex;
      gap: 30px;
      margin: 10px 0;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .back-btn {
      background: none;
      border: none;
      color: #ff8c00;
      cursor: pointer;
      font-size: 1.2rem;
      margin-bottom: 20px;
      display: inline-block;
    }
    .back-btn:hover {
      text-decoration: underline;
    }

    .section-title {
      font-size: 1.5rem;
      border-right: 4px solid #ff8c00;
      padding-right: 15px;
      margin: 20px 0 10px;
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <!-- Header -->
  <div class="glitchy-title">
    <span>Glitchy maghale</span>
    <div class="relative" id="adminMenuWrapper">
      <span class="admin-dots" id="dotsMenu">⋮</span>
      <div class="dropdown-menu hidden" id="dropdownMenu">
        <div id="menuUsers">👥 Users</div>
        <div id="menuCreateArticle">✏️ Create new article</div>
        <div id="menuLogout">🚪 Logout</div>
      </div>
    </div>
  </div>

  <!-- ========== AUTH SECTION ========== -->
  <div id="authSection">
    <div id="loginForm" class="auth-box">
      <h2>ورود</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="نام کاربری">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="رمز عبور">
      </div>
      <button class="btn btn-primary" id="loginBtn">ورود</button>
      <div class="auth-toggle">حساب ندارید؟ <a id="goToRegister">ثبت نام کنید</a></div>
    </div>

    <div id="registerForm" class="auth-box hidden">
      <h2>ثبت نام</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUser" placeholder="نام کاربری">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="رمز عبور">
      </div>
      <div class="form-group">
        <label>📍 عضویت در گروه (فقط یکی):</label>
        <div class="radio-group">
          <label><input type="radio" name="faction" value="shadow"> Shadow Company</label>
          <label><input type="radio" name="faction" value="alborz"> Alborz</label>
        </div>
      </div>
      <div class="form-group">
        <label>🎮 علاقه به بخش‌های دیگر (اختیاری):</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="regGame" value="game"> Game</label>
          <label><input type="checkbox" id="regNews" value="news"> News</label>
        </div>
      </div>
      <button class="btn btn-primary" id="registerBtn">ثبت نام</button>
      <div class="auth-toggle">قبلاً ثبت نام کردید؟ <a id="goToLogin">ورود</a></div>
    </div>
  </div>

  <!-- ========== DASHBOARD ========== -->
  <div id="dashboardSection" class="hidden">
    <div id="categoryGrid" class="card-grid"></div>
    <div id="articlesContainer"></div>
  </div>

  <!-- ========== ADMIN: USERS ========== -->
  <div id="usersSection" class="hidden">
    <button class="back-btn" id="backFromUsers">← بازگشت</button>
    <h2>مدیریت کاربران</h2>
    <div id="userList"></div>
  </div>

  <!-- ========== ADMIN: CREATE ARTICLE ========== -->
  <div id="createArticleSection" class="hidden">
    <button class="back-btn" id="backFromCreate">← بازگشت</button>
    <h2>ساخت مقاله جدید</h2>
    <div class="form-group">
      <label>عنوان مقاله</label>
      <input type="text" id="articleTitle" placeholder="تیتر مقاله...">
    </div>
    <div class="form-group">
      <label>🖼️ تامبنیل (تصویر شاخص)</label>
      <div class="file-input-group">
        <label>📎 انتخاب تصویر <input type="file" id="thumbInput" accept="image/*"></label>
      </div>
    </div>
    <div class="form-group">
      <label>متن مقاله</label>
      <textarea id="articleBody" placeholder="متن مقاله را بنویسید..."></textarea>
    </div>
    <div class="form-group">
      <label>📷 تصاویر داخل مقاله (۳ عدد)</label>
      <div class="file-input-group">
        <label>➕ 1 <input type="file" id="img1" accept="image/*"></label>
        <label>➕ 2 <input type="file" id="img2" accept="image/*"></label>
        <label>➕ 3 <input type="file" id="img3" accept="image/*"></label>
      </div>
    </div>
    <div class="form-group">
      <label>📬 ارسال به دسته‌بندی‌ها (چندتایی):</label>
      <div class="checkbox-group">
        <label><input type="checkbox" class="cat-check" value="shadow"> Shadow Company</label>
        <label><input type="checkbox" class="cat-check" value="alborz"> Alborz</label>
        <label><input type="checkbox" class="cat-check" value="game"> Game</label>
        <label><input type="checkbox" class="cat-check" value="news"> News</label>
      </div>
    </div>
    <button class="btn btn-primary" id="sendArticleBtn" style="background:#ff8c00; color:#0b0b0b;">🚀 Send</button>
  </div>
</div>

<script>
  // ----------------------------------------------
  // DATA LAYER (localStorage)
  // ----------------------------------------------
  function getUsers() {
    return JSON.parse(localStorage.getItem('glitchy_users') || '[]');
  }
  function saveUsers(users) {
    localStorage.setItem('glitchy_users', JSON.stringify(users));
  }
  function getArticles() {
    return JSON.parse(localStorage.getItem('glitchy_articles') || '[]');
  }
  function saveArticles(articles) {
    localStorage.setItem('glitchy_articles', JSON.stringify(articles));
  }

  // ----------------------------------------------
  // HELPERS
  // ----------------------------------------------
  function currentUser() {
    const data = JSON.parse(sessionStorage.getItem('glitchy_session') || 'null');
    return data;
  }
  function setSession(user) {
    sessionStorage.setItem('glitchy_session', JSON.stringify(user));
  }
  function clearSession() {
    sessionStorage.removeItem('glitchy_session');
  }

  function getUserByUsername(username) {
    return getUsers().find(u => u.username === username);
  }

  function isAdmin(user) {
    return user && user.username === 'glitchykach' && user.password === 'glitchykachfnaf';
  }

  function readFileAsDataURL(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  // ----------------------------------------------
  // UI RENDER FUNCTIONS
  // ----------------------------------------------
  function renderDashboard() {
    const user = currentUser();
    if (!user) return showAuth('login');

    document.getElementById('authSection').classList.add('hidden');
    document.getElementById('dashboardSection').classList.remove('hidden');
    document.getElementById('usersSection').classList.add('hidden');
    document.getElementById('createArticleSection').classList.add('hidden');

    // Admin dots
    const dots = document.getElementById('dotsMenu');
    const dropdown = document.getElementById('dropdownMenu');
    if (isAdmin(user)) {
      dots.classList.remove('hidden');
      // attach events again
    } else {
      dots.classList.add('hidden');
      dropdown.classList.add('hidden');
    }

    // Build category grid based on user selections
    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    const categories = [];
    // mandatory faction
    if (user.faction === 'shadow') categories.push({ key: 'shadow', label: 'Shadow Company' });
    else if (user.faction === 'alborz') categories.push({ key: 'alborz', label: 'Alborz' });
    // extras
    if (user.extras && user.extras.includes('game')) categories.push({ key: 'game', label: 'Game' });
    if (user.extras && user.extras.includes('news')) categories.push({ key: 'news', label: 'News' });

    if (categories.length === 0) {
      grid.innerHTML = '<p style="color:#888;">هیچ دسته‌بندی برای شما فعال نیست.</p>';
    } else {
      categories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.textContent = cat.label;
        card.dataset.cat = cat.key;
        card.addEventListener('click', () => showArticles(cat.key));
        grid.appendChild(card);
      });
    }

    // Clear articles container
    document.getElementById('articlesContainer').innerHTML = '';
  }

  function showArticles(categoryKey) {
    const container = document.getElementById('articlesContainer');
    const allArticles = getArticles();
    const filtered = allArticles.filter(a => a.categories && a.categories.includes(categoryKey));

    if (filtered.length === 0) {
      container.innerHTML = `<div class="article-preview" style="text-align:center;color:#888;">هیچ مقاله‌ای در این بخش وجود ندارد.</div>`;
      return;
    }

    let html = `<div class="section-title">📄 مقالات</div>`;
    filtered.forEach(a => {
      html += `
        <div class="article-preview">
          <h3>${a.title}</h3>
          ${a.thumbnail ? `<img src="${a.thumbnail}" style="max-height:200px;object-fit:cover;border-radius:12px;">` : ''}
          <div style="margin:10px 0;white-space:pre-wrap;color:#bbb;">${a.body}</div>
          ${a.images && a.images.length ? a.images.map(img => `<img src="${img}" style="max-height:150px;margin:5px;border-radius:8px;">`).join('') : ''}
          <div class="article-meta">${new Date(a.date).toLocaleDateString('fa-IR')}</div>
        </div>
      `;
    });
    container.innerHTML = html;
    // scroll to articles
    container.scrollIntoView({ behavior: 'smooth' });
  }

  function showAuth(form) {
    document.getElementById('authSection').classList.remove('hidden');
    document.getElementById('dashboardSection').classList.add('hidden');
    document.getElementById('usersSection').classList.add('hidden');
    document.getElementById('createArticleSection').classList.add('hidden');

    if (form === 'login') {
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
    } else {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    }
  }

  function renderUsers() {
    const users = getUsers();
    const container = document.getElementById('userList');
    container.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item';
      const isAdminUser = isAdmin(u);
      div.innerHTML = `
        <span><strong>${u.username}</strong> ${isAdminUser ? '👑' : ''} 
        (${u.faction === 'shadow' ? 'Shadow' : 'Alborz'} ${u.extras ? u.extras.join(', ') : ''})</span>
        ${!isAdminUser ? `<button class="btn btn-danger" data-del="${u.username}">حذف</button>` : '<span style="color:#666;">ادمین</span>'}
      `;
      container.appendChild(div);
      const delBtn = div.querySelector('[data-del]');
      if (delBtn) {
        delBtn.addEventListener('click', () => {
          if (confirm(`کاربر ${u.username} حذف شود؟`)) {
            let all = getUsers();
            all = all.filter(x => x.username !== u.username);
            saveUsers(all);
            renderUsers();
          }
        });
      }
    });
  }

  // ----------------------------------------------
  // AUTH EVENTS
  // ----------------------------------------------
  document.getElementById('goToRegister').addEventListener('click', () => showAuth('register'));
  document.getElementById('goToLogin').addEventListener('click', () => showAuth('login'));

  document.getElementById('registerBtn').addEventListener('click', async () => {
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value.trim();
    const faction = document.querySelector('input[name="faction"]:checked');
    const gameChecked = document.getElementById('regGame').checked;
    const newsChecked = document.getElementById('regNews').checked;

    if (!username || !password) return alert('نام کاربری و رمز عبور الزامی است');
    if (!faction) return alert('لطفاً یکی از دو گروه (Shadow یا Alborz) را انتخاب کنید');

    const users = getUsers();
    if (users.find(u => u.username === username)) return alert('این نام کاربری قبلاً ثبت شده است');

    const extras = [];
    if (gameChecked) extras.push('game');
    if (newsChecked) extras.push('news');

    const newUser = {
      username,
      password,
      faction: faction.value,
      extras,
      isAdmin: false
    };
    users.push(newUser);
    saveUsers(users);
    alert('ثبت نام با موفقیت انجام شد! حالا وارد شوید.');
    showAuth('login');
  });

  document.getElementById('loginBtn').addEventListener('click', () => {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();

    if (!username || !password) return alert('نام کاربری و رمز عبور را وارد کنید');

    const users = getUsers();
    let user = users.find(u => u.username === username && u.password === password);

    // Admin hard check
    if (username === 'glitchykach' && password === 'glitchykachfnaf') {
      // ensure admin exists in db
      let admin = users.find(u => u.username === 'glitchykach');
      if (!admin) {
        admin = {
          username: 'glitchykach',
          password: 'glitchykachfnaf',
          faction: 'shadow',
          extras: ['game', 'news'],
          isAdmin: true
        };
        users.push(admin);
        saveUsers(users);
      } else {
        admin.isAdmin = true;
        saveUsers(users);
      }
      user = admin;
    }

    if (!user) return alert('نام کاربری یا رمز عبور اشتباه است');

    setSession(user);
    renderDashboard();
  });

  // ----------------------------------------------
  // DASHBOARD / ADMIN MENU
  // ----------------------------------------
