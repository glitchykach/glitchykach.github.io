<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHADOW SYSTEM | SECURE</title>
    <style>
        :root { --bg: #0d0d0f; --sec: #18181c; --acc: #6c5ce7; --txt: #f0f0f4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--txt); margin: 0; height: 100vh; display: flex; }
        
        /* استایل‌های پایه */
        #loginPage { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .card { background: var(--sec); padding: 30px; border-radius: 15px; width: 320px; border: 1px solid #333; }
        
        #app { display: none; width: 100%; height: 100%; }
        .sidebar { width: 250px; background: var(--sec); border-left: 1px solid #333; display: flex; flex-direction: column; }
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        
        input { width: 100%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: var(--acc); border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="card">
            <h3>SHADOW LOGIN</h3>
            <input type="text" id="inUser" placeholder="نام کاربری">
            <input type="password" id="inPass" placeholder="رمز عبور">
            <button onclick="handleLogin()">ورود / ثبت‌نام</button>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div style="padding: 15px;">
                <button onclick="addNewUser()">+ کاربر جدید</button>
            </div>
            <div id="userList"></div>
        </div>
        <div class="chat-main">
            <div id="chatMessages" style="flex: 1; padding: 20px; overflow-y: auto;"></div>
            <div style="padding: 20px; display: flex;">
                <input type="text" id="msgInput" placeholder="پیام...">
                <button onclick="sendMessage()" style="width: auto;">ارسال</button>
            </div>
        </div>
    </div>

    <script>
        // دیتابیس محلی (ذخیره کاربران و پسوردها)
        let users = JSON.parse(localStorage.getItem('users')) || { "admin": "123" };

        function handleLogin() {
            const u = document.getElementById('inUser').value;
            const p = document.getElementById('inPass').value;
            
            if(users[u]) {
                if(users[u] === p) {
                    document.getElementById('loginPage').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    renderUsers();
                } else { alert("رمز اشتباه است!"); }
            } else {
                if(confirm("کاربر موجود نیست. ثبت‌نام می‌کنید؟")) {
                    users[u] = p;
                    localStorage.setItem('users', JSON.stringify(users));
                    alert("ثبت شد! حالا وارد شوید.");
                }
            }
        }

        function addNewUser() {
            const u = prompt("نام کاربری جدید:");
            const p = prompt("رمز عبور:");
            if(u && p) {
                users[u] = p;
                localStorage.setItem('users', JSON.stringify(users));
                renderUsers();
            }
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            Object.keys(users).forEach(u => {
                list.innerHTML += `<div style="padding: 10px; cursor: pointer;" onclick="alert('چت با ${u}')">${u}</div>`;
            });
        }

        function sendMessage() {
            const m = document.getElementById('msgInput').value;
            if(m) {
                document.getElementById('chatMessages').innerHTML += `<p>${m}</p>`;
                document.getElementById('msgInput').value = "";
            }
        }
    </script>
</body>
</html>
