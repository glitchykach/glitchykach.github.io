<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitchy maghale</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #0b0b0b;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      width: 100%;
      background: #141414;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid #2a2a2a;
      min-height: 500px;
    }

    h2, h3 {
      color: #f5f5f5;
      font-weight: 500;
    }

    .glitchy-title {
      font-size: 2rem;
      color: #ff8c00;
      text-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
      letter-spacing: 1px;
      border-bottom: 2px solid #2a2a2a;
      padding-bottom: 15px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .glitchy-title span {
      font-size: 1.5rem;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #ccc;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 1rem;
      transition: all 0.2s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: #ff8c00;
      box-shadow: 0 0 8px rgba(255, 140, 0, 0.2);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .btn {
      background: #2a2a2a;
      border: none;
      padding: 12px 28px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #eee;
    }

    .btn-primary {
      background: #ff8c00;
      color: #0b0b0b;
    }
    .btn-primary:hover {
      background: #e67e00;
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
    }

    .btn-danger {
      background: #c0392b;
      color: white;
    }
    .btn-danger:hover {
      background: #e74c3c;
    }

    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .cat-card {
      background: #1c1c1c;
      border-radius: 20px;
      padding: 30px 15px;
      text-align: center;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: 0.2s;
      font-weight: 600;
      font-size: 1.2rem;
      color: #ddd;
    }

    .cat-card:hover {
      background: #282828;
      border-color: #ff8c00;
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .hidden {
      display: none !important;
    }

    .auth-box {
      max-width: 450px;
      margin: 30px auto;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 20px;
      border: 1px solid #2a2a2a;
    }

    .auth-box h2 {
      margin-bottom: 20px;
      text-align: center;
      color: #ff8c00;
    }

    .auth-box .btn {
      width: 100%;
      margin-top: 15px;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 15px;
      color: #888;
    }
    .auth-toggle a {
      color: #ff8c00;
      cursor: pointer;
      text-decoration: underline;
    }

    .admin-dots {
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
      padding: 0 15px;
      user-select: none;
      position: relative;
    }

    .admin-dots:hover {
      color: #ff8c00;
    }

    .dropdown-menu {
      position: absolute;
      top: 45px;
      left: 0;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 10px 0;
      min-width: 200px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
      z-index: 100;
    }

    .dropdown-menu div {
      padding: 12px 22px;
      cursor: pointer;
      color: #ddd;
      transition: 0.1s;
    }
    .dropdown-menu div:hover {
      background: #2a2a2a;
      color: #ff8c00;
    }

    .relative {
      position: relative;
    }

    .user-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      padding: 12px 18px;
      border-radius: 12px;
      margin-bottom: 10px;
      border: 1px solid #2a2a2a;
    }

    .article-preview {
      background: #181818;
      border-radius: 16px;
      padding: 25px;
      margin-top: 20px;
      border: 1px solid #2a2a2a;
    }

    .article-preview img {
      max-width: 100%;
      border-radius: 12px;
      margin: 15px 0;
    }

    .article-meta {
      color: #ff8c00;
      font-size: 0.85rem;
      margin-top: 15px;
    }

    .file-input-group {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .file-input-group label {
      background: #252525;
      padding: 10px 20px;
      border-radius: 30px;
      cursor: pointer;
      border: 1px solid #3a3a3a;
      display: inline-block;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .file-input-group label:hover {
      background: #333;
      border-color: #ff8c00;
    }
    .file-input-group input[type="file"] {
      display: none;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 10px 0;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #ccc;
    }
    .checkbox-group input[type="checkbox"],
    .checkbox-group input[type="radio"] {
      width: 18px;
      height: 18px;
      accent-color: #ff8c00;
      cursor: pointer;
    }

    .radio-group {
      display: flex;
      gap: 30px;
      margin: 10px 0;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .back-btn {
      background: none;
      border: none;
      color: #ff8c00;
      cursor: pointer;
      font-size: 1.2rem;
      margin-bottom: 20px;
      display: inline-block;
    }
    .back-btn:hover {
      text-decoration: underline;
    }

    .section-title {
      font-size: 1.5rem;
      border-right: 4px solid #ff8c00;
      padding-right: 15px;
      margin: 25px 0 15px;
    }
  </style>
</head>
<body>

<div class="container" id="app">
  <div class="glitchy-title">
    <span>Glitchy maghale</span>
    <div class="relative" id="adminMenuWrapper">
      <span class="admin-dots hidden" id="dotsMenu">⋮</span>
      <div class="dropdown-menu hidden" id="dropdownMenu">
        <div id="menuUsers">👥 Users</div>
        <div id="menuCreateArticle">✏️ Create new article</div>
        <div id="menuLogout">🚪 Logout</div>
      </div>
    </div>
  </div>

  <div id="authSection">
    <div id="loginForm" class="auth-box">
      <h2>ورود</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUser" placeholder="نام کاربری">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="رمز عبور">
      </div>
      <button class="btn btn-primary" id="loginBtn">ورود</button>
      <div class="auth-toggle">حساب ندارید؟ <a id="goToRegister">ثبت نام کنید</a></div>
    </div>

    <div id="registerForm" class="auth-box hidden">
      <h2>ثبت نام</h2>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUser" placeholder="نام کاربری">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPass" placeholder="رمز عبور">
      </div>
      <div class="form-group">
        <label>📍 عضویت در گروه (فقط یکی):</label>
        <div class="radio-group">
          <label><input type="radio" name="faction" value="shadow"> Shadow Company</label>
          <label><input type="radio" name="faction" value="alborz"> Alborz</label>
        </div>
      </div>
      <div class="form-group">
        <label>🎮 علاقه به بخش‌های دیگر (اختیاری):</label>
        <div class="checkbox-group">
          <label><input type="checkbox" id="regGame" value="game"> Game</label>
          <label><input type="checkbox" id="regNews" value="news"> News</label>
        </div>
      </div>
      <button class="btn btn-primary" id="registerBtn">ثبت نام</button>
      <div class="auth-toggle">قبلاً ثبت نام کردید؟ <a id="goToLogin">ورود</a></div>
    </div>
  </div>

  <div id="dashboardSection" class="hidden">
    <div id="categoryGrid" class="card-grid"></div>
    <div id="articlesContainer"></div>
  </div>

  <div id="usersSection" class="hidden">
    <button class="back-btn" id="backFromUsers">← بازگشت</button>
    <h2>مدیریت کاربران</h2>
    <div id="userList"></div>
  </div>

  <div id="createArticleSection" class="hidden">
    <button class="back-btn" id="backFromCreate">← بازگشت</button>
    <h2>ساخت مقاله جدید</h2>
    <div class="form-group">
      <label>عنوان مقاله</label>
      <input type="text" id="articleTitle" placeholder="تیتر مقاله...">
    </div>
    <div class="form-group">
      <label>🖼️ تامبنیل (تصویر شاخص)</label>
      <div class="file-input-group">
        <label for="thumbInput" id="label_thumbInput">📎 انتخاب تصویر</label>
        <input type="file" id="thumbInput" accept="image/*">
      </div>
    </div>
    <div class="form-group">
      <label>متن مقاله</label>
      <textarea id="articleBody" placeholder="متن مقاله را بنویسید..."></textarea>
    </div>
    <div class="form-group">
      <label>📷 تصاویر داخل مقاله (۳ عدد اختیاری)</label>
      <div class="file-input-group">
        <label for="img1" id="label_img1">➕ تصویر ۱</label>
        <input type="file" id="img1" accept="image/*">
        
        <label for="img2" id="label_img2">➕ تصویر ۲</label>
        <input type="file" id="img2" accept="image/*">
        
        <label for="img3" id="label_img3">➕ تصویر ۳</label>
        <input type="file" id="img3" accept="image/*">
      </div>
    </div>
    <div class="form-group">
      <label>📬 ارسال به دسته‌بندی‌ها (چندتایی):</label>
      <div class="checkbox-group">
        <label><input type="checkbox" class="cat-check" value="shadow"> Shadow Company</label>
        <label><input type="checkbox" class="cat-check" value="alborz"> Alborz</label>
        <label><input type="checkbox" class="cat-check" value="game"> Game</label>
        <label><input type="checkbox" class="cat-check" value="news"> News</label>
      </div>
    </div>
    <button class="btn btn-primary" id="sendArticleBtn" style="background:#ff8c00; color:#0b0b0b;">🚀 Send</button>
  </div>
</div>

<script>
  // ----------------------------------------------
  // DATA LAYER (localStorage)
  // ----------------------------------------------
  function getUsers() {
    return JSON.parse(localStorage.getItem('glitchy_users') || '[]');
  }
  function saveUsers(users) {
    localStorage.setItem('glitchy_users', JSON.stringify(users));
  }
  function getArticles() {
    return JSON.parse(localStorage.getItem('glitchy_articles') || '[]');
  }
  function saveArticles(articles) {
    localStorage.setItem('glitchy_articles', JSON.stringify(articles));
  }

  // ----------------------------------------------
  // HELPERS
  // ----------------------------------------------
  function currentUser() {
    return JSON.parse(sessionStorage.getItem('glitchy_session') || 'null');
  }
  function setSession(user) {
    sessionStorage.setItem('glitchy_session', JSON.stringify(user));
  }
  function clearSession() {
    sessionStorage.removeItem('glitchy_session');
  }

  function isAdmin(user) {
    return user && user.username === 'glitchykach' && user.password === 'glitchykachfnaf';
  }

  function readFileAsDataURL(file) {
    return new Promise((resolve) => {
      if (!file) {
        resolve('');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = () => resolve('');
      reader.readAsDataURL(file);
    });
  }

  // Helper to visually update file inputs when selected
  function syncFileInputLabel(inputId, defaultText) {
    const input = document.getElementById(inputId);
    const label = document.getElementById('label_' + inputId);
    if(input && label) {
      input.addEventListener('change', () => {
        if(input.files && input.files[0]) {
          label.textContent = '✅ انتخاب شد';
          label.style.borderColor = '#ff8c00';
        } else {
          label.textContent = defaultText;
          label.style.borderColor = '#3a3a3a';
        }
      });
    }
  }

  // ----------------------------------------------
  // UI RENDER FUNCTIONS
  // ----------------------------------------------
  function renderDashboard() {
    const user = currentUser();
    if (!user) return showAuth('login');

    document.getElementById('authSection').classList.add('hidden');
    document.getElementById('dashboardSection').classList.remove('hidden');
    document.getElementById('usersSection').classList.add('hidden');
    document.getElementById('createArticleSection').classList.add('hidden');

    const dots = document.getElementById('dotsMenu');
    const dropdown = document.getElementById('dropdownMenu');
    
    if (isAdmin(user)) {
      dots.classList.remove('hidden');
    } else {
      dots.classList.add('hidden');
      dropdown.classList.add('hidden');
    }

    const grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    const categories = [];
    
    if (user.faction === 'shadow') categories.push({ key: 'shadow', label: 'Shadow Company' });
    else if (user.faction === 'alborz') categories.push({ key: 'alborz', label: 'Alborz' });
    
    if (user.extras && user.extras.includes('game')) categories.push({ key: 'game', label: 'Game' });
    if (user.extras && user.extras.includes('news')) categories.push({ key: 'news', label: 'News' });

    if (categories.length === 0) {
      grid.innerHTML = '<p style="color:#888; padding:20px;">هیچ دسته‌بندی برای شما فعال نیست.</p>';
    } else {
      categories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'cat-card';
        card.textContent = cat.label;
        card.dataset.cat = cat.key;
        card.addEventListener('click', () => showArticles(cat.key));
        grid.appendChild(card);
      });
    }

    document.getElementById('articlesContainer').innerHTML = '';
  }

  function showArticles(categoryKey) {
    const container = document.getElementById('articlesContainer');
    const allArticles = getArticles();
    const filtered = allArticles.filter(a => a.categories && a.categories.includes(categoryKey));

    if (filtered.length === 0) {
      container.innerHTML = `<div class="article-preview" style="text-align:center;color:#888;">هیچ مقاله‌ای در این بخش وجود ندارد.</div>`;
      return;
    }

    let html = `<div class="section-title">📄 مقالات</div>`;
    filtered.forEach(a => {
      html += `
        <div class="article-preview">
          <h3>${a.title}</h3>
          ${a.thumbnail ? `<img src="${a.thumbnail}" style="max-height:300px;width:100%;object-fit:cover;border-radius:12px;margin:10px 0;">` : ''}
          <div style="margin:15px 0;white-space:pre-wrap;color:#bbb;line-height:1.7;font-size:1.05rem;">${a.body}</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap; margin:10px 0;">
            ${a.images && a.images.length ? a.images.map(img => img ? `<img src="${img}" style="max-height:180px; max-width:48%; border-radius:8px; object-fit:cover;">` : '').join('') : ''}
          </div>
          <div class="article-meta">📅 منتشر شده در تاریخ: ${new Date(a.date).toLocaleDateString('fa-IR')}</div>
        </div>
      `;
    });
    container.innerHTML = html;
    container.scrollIntoView({ behavior: 'smooth' });
  }

  function showAuth(form) {
    document.getElementById('authSection').classList.remove('hidden');
    document.getElementById('dashboardSection').classList.add('hidden');
    document.getElementById('usersSection').classList.add('hidden');
    document.getElementById('createArticleSection').classList.add('hidden');
    document.getElementById('dotsMenu').classList.add('hidden');
    document.getElementById('dropdownMenu').classList.add('hidden');

    if (form === 'login') {
      document.getElementById('loginForm').classList.remove('hidden');
      document.getElementById('registerForm').classList.add('hidden');
    } else {
      document.getElementById('loginForm').classList.add('hidden');
      document.getElementById('registerForm').classList.remove('hidden');
    }
  }

  function renderUsers() {
    const users = getUsers();
    const container = document.getElementById('userList');
    container.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item';
      const isAdminUser = isAdmin(u);
      div.innerHTML = `
        <span><strong>${u.username}</strong> ${isAdminUser ? '👑' : ''} 
        (${u.faction === 'shadow' ? 'Shadow' : 'Alborz'} ${u.extras && u.extras.length ? '| ' + u.extras.join(', ') : ''})</span>
        ${!isAdminUser ? `<button class="btn btn-danger" data-del="${u.username}">حذف</button>` : '<span style="color:#666; font-weight:bold;">ادمین اصلی</span>'}
      `;
      container.appendChild(div);
      
      const delBtn = div.querySelector('[data-del]');
      if (delBtn) {
        delBtn.addEventListener('click', () => {
          if (confirm(`آیا از حذف کاربر ${u.username} مطمئن هستید؟`)) {
            let all = getUsers();
            all = all.filter(x => x.username !== u.username);
            saveUsers(all);
            renderUsers();
          }
        });
      }
    });
  }

  // ----------------------------------------------
  // EVENTS & INITIALIZATION
  // ----------------------------------------------
  document.getElementById('goToRegister').addEventListener('click', () => showAuth('register'));
  document.getElementById('goToLogin').addEventListener('click', () => showAuth('login'));

  // Dropdown Toggle
  document.getElementById('dotsMenu').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('dropdownMenu').classList.toggle('hidden');
  });
  document.addEventListener('click', () => {
    document.getElementById('dropdownMenu').classList.add('hidden');
  });

  // Navigation Menu Actions
  document.getElementById('menuUsers').addEventListener('click', () => {
    document.getElementById('dashboardSection').classList.add('hidden');
    document.getElementById('usersSection').classList.remove('hidden');
    renderUsers();
  });
  document.getElementById('menuCreateArticle').addEventListener('click', () => {
    document.getElementById('dashboardSection').classList.add('hidden');
    document.getElementById('createArticleSection').classList.remove('hidden');
  });
  document.getElementById('menuLogout').addEventListener('click', () => {
    clearSession();
    showAuth('login');
  });
  
  document.getElementById('backFromUsers').addEventListener('click', renderDashboard);
  document.getElementById('backFromCreate').addEventListener('click', renderDashboard);

  // Sync labels for file uploading visual feedback
  syncFileInputLabel('thumbInput', '📎 انتخاب تصویر');
  syncFileInputLabel('img1', '➕ تصویر ۱');
  syncFileInputLabel('img2', '➕ تصویر ۲');
  s
