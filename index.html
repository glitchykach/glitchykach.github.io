<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHADOW COMPANY - Secure Gap</title>
    <style>
        :root {
            --bg-primary: #0d0d0f; --bg-secondary: #18181c; --accent: #6c5ce7;
            --text-primary: #f0f0f4; --border-color: #2e2e3a;
        }
        *, * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; }

        /* صفحه لاگین با پسورد */
        #loginPage { display: flex; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #1a1a2e 0%, #0d0d0f 100%); }
        .login-card { background: var(--bg-secondary); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; border: 1px solid var(--border-color); text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; background: #0d0d0f; border: 1px solid var(--border-color); color: white; border-radius: 8px; }
        
        #app { display: none; height: 100vh; display: flex; }
        #app.active { display: flex; }

        /* ریسپانسیو بودن موبایل */
        .sidebar { width: 300px; background: var(--bg-secondary); border-left: 1px solid var(--border-color); transition: 0.3s; }
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -300px; z-index: 100; height: 100%; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
            .sidebar.active { left: 0; }
        }

        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .message-bubble { padding: 12px 18px; border-radius: 18px; background: #22222a; margin: 5px; max-width: 80%; }
        .sent .message-bubble { background: var(--accent); align-self: flex-end; }
    </style>
</head>
<body>

    <div id="loginPage">
        <div class="login-card">
            <h2 style="color: var(--accent); margin-bottom: 20px;">ورود امن SHADOW</h2>
            <input type="text" id="username" placeholder="نام کاربری">
            <input type="password" id="password" placeholder="رمز عبور">
            <button id="loginBtn" style="width: 100%; padding: 12px; background: var(--accent); border: none; color: white; border-radius: 8px; cursor: pointer;">ورود</button>
        </div>
    </div>

    <div id="app">
        <div class="sidebar" id="sidebar">
            <div style="padding: 20px; font-weight: bold;">لیست کاربران</div>
            <div id="userList" style="padding: 10px;"></div>
        </div>
        <div class="chat-area">
            <div id="chatMessages" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 20px;"></div>
            <div style="padding: 20px; display: flex; gap: 10px;">
                <input type="text" id="messageInput" style="flex: 1; padding: 12px; background: #1a1a20; border: 1px solid var(--border-color); color: white; border-radius: 8px;">
                <button id="sendBtn" style="padding: 10px 20px; background: var(--accent); border: none; color: white; border-radius: 8px;">ارسال</button>
            </div>
        </div>
    </div>

    <script>
        // لاگین با پسورد
        document.getElementById('loginBtn').addEventListener('click', () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if(user && pass) {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('app').classList.add('active');
            } else {
                alert("نام کاربری و رمز عبور را وارد کنید!");
            }
        });

        // ارسال پیام و مدیریت ریسپانسیو
        document.getElementById('sendBtn').addEventListener('click', () => {
            const msg = document.getElementById('messageInput').value;
            if(msg) {
                const div = document.createElement('div');
                div.className = 'message-group sent';
                div.innerHTML = `<div class="message-bubble">${msg}</div>`;
                document.getElementById('chatMessages').appendChild(div);
                document.getElementById('messageInput').value = '';
            }
        });
    </script>
</body>
</html>
